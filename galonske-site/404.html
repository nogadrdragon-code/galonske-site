<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Page introuvable — Cédric Galonské</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      background: #faf8f3; color: #15130e; padding: 24px;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .code { font-family: 'IBM Plex Mono', monospace; font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: #9c7b4d; margin-bottom: 24px; }
    h1 { font-family: 'Fraunces', Georgia, serif; font-size: clamp(40px, 7vw, 72px); font-weight: 300; line-height: 1.1; margin-bottom: 16px; }
    p { font-weight: 300; color: #6e6a61; max-width: 360px; line-height: 1.7; margin-bottom: 36px; }
    a { font-family: 'IBM Plex Mono', monospace; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: #15130e; text-decoration: none; border-bottom: 1px solid #9c7b4d; padding-bottom: 4px; transition: color 0.2s; }
    a:hover { color: #9c7b4d; }
  </style>
</head>
<body>
  <p class="code">Erreur 404</p>
  <h1>Page introuvable.</h1>
  <p>La page que vous cherchez n'existe pas ou a été déplacée.</p>
  <a href="/">Retour à l'accueil</a>
</body>
</html>
